name: CMake

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-2022 ]
        # Disabled until <curses.h> can be safely included without conflict in terminal.h
        # os: [ ubuntu-latest, windows-2022, macos-latest ]
        include:
          - os: ubuntu-latest
            cmake-preset: ci-linux
          - os: windows-2022
            cmake-preset: default

    runs-on: ${{matrix.os}}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true

    - name: Setup vcpkg package cache
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@ed02513be6a29eba59f935616137efa877d42f69 # FreeBSD vcpkg tool cache
      with:
        token: ${{github.token}}
        bootstrap: "true"
        install-nuget: "true"
        debug: "false"
        trace: "false"

    - name: CMake version
      run: cmake --version

    - name: CMake workflow
      shell: pwsh
      run: |
        cmake --workflow --preset ${{matrix.cmake-preset}} 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@ed02513be6a29eba59f935616137efa877d42f69 # FreeBSD vcpkg tool cache
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.job}}-${{matrix.os}}-${{matrix.cmake-preset}}
        fail-on: "never"
        debug: "false"
        trace: "false"

  build-freebsd:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true

    - name: Generate vcpkg cache setup script
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@ed02513be6a29eba59f935616137efa877d42f69 # FreeBSD vcpkg tool cache
      with:
        token: ${{github.token}}
        execution-mode: emit-script
        target-os: freebsd
        bootstrap: "true"
        install-nuget: "true"
        install-mono: "true"
        debug: "false"
        trace: "false"

    - name: CMake workflow on FreeBSD
      uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636 # v1
      env:
        VCPKG_GITHUB_CACHE_TOKEN: ${{github.token}}
        VCPKG_ROOT: vcpkg
      with:
        release: "14.3"
        usesh: true
        sync: rsync
        copyback: true
        envs: VCPKG_GITHUB_CACHE_TOKEN VCPKG_ROOT
        prepare: |
          pkg update
          pkg install -y cmake ninja git pkgconf patchelf gmake bash bison
        run: |
          set +e
          set -u
          mkdir -p .freebsd-copyback
          {
            sh "${{steps.vc.outputs.setup-script}}" &&
            . "${{steps.vc.outputs.setup-env}}" &&
            cmake --version &&
            cmake --workflow --preset ci-linux
            status=$?
            echo "${status}" > build.status
          } 2>&1 | tee build.log
          cp build.log build.status .freebsd-copyback/
          # Copy project build products needed by host steps here.
          find . -mindepth 1 -maxdepth 1 ! -name .git \
            ! -name .freebsd-copyback -exec rm -rf {} +
          mv .freebsd-copyback/* .
          rmdir .freebsd-copyback

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@ed02513be6a29eba59f935616137efa877d42f69 # FreeBSD vcpkg tool cache
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.job}}-freebsd-ci-linux
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Check FreeBSD build status
      if: always()
      run: |
        if [ ! -f build.status ]; then
          echo "build.status was not copied back from the FreeBSD VM"
          exit 1
        fi
        exit "$(cat build.status)"
